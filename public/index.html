<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Space Fleet Command</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- LOGIN SCREEN -->
  <div id="login-screen">
    <div class="login-box">
      <h1 class="game-title">SPACE FLEET<br>COMMAND</h1>
      <div class="login-subtitle">Take command of your fleet</div>
      <input type="text" id="player-name" placeholder="Enter Commander Name" maxlength="20" autofocus>
      <button id="join-btn" onclick="joinGame()">LAUNCH</button>
    </div>
    <div class="stars-bg" id="stars-bg"></div>
  </div>

  <!-- GAME SCREEN -->
  <div id="game-screen" style="display:none;">
    <!-- Top Bar -->
    <div id="top-bar">
      <div id="player-info">
        <span id="player-name-display"></span>
        <span id="alliance-tag-display"></span>
      </div>
      <div id="resources-bar">
        <span class="resource" title="Stellite"><span class="res-icon" style="color:#E67E22">&#9670;</span> <span id="res-stellite">0</span></span>
        <span class="resource" title="Ferronite"><span class="res-icon" style="color:#8B8B8B">&#9670;</span> <span id="res-ferronite">0</span></span>
        <span class="resource" title="Nexium"><span class="res-icon" style="color:#9B59B6">&#9670;</span> <span id="res-nexium">0</span></span>
        <span class="resource" title="Pyrathium"><span class="res-icon" style="color:#E74C3C">&#9670;</span> <span id="res-pyrathium">0</span></span>
        <span class="resource" title="Aurelium"><span class="res-icon" style="color:#F1C40F">&#9670;</span> <span id="res-aurelium">0</span></span>
      </div>
      <div id="view-toggle">
        <button id="btn-galaxy-view" class="view-btn active" onclick="showGalaxyView()">Galaxy Map</button>
        <button id="btn-system-view" class="view-btn" onclick="showSystemView()">System View</button>
      </div>
    </div>

    <!-- Main Game Area -->
    <div id="game-area">
      <!-- Galaxy Map Canvas -->
      <canvas id="galaxy-canvas" width="800" height="600" style="display:none;"></canvas>

      <!-- System View Canvas -->
      <canvas id="system-canvas" width="800" height="600"></canvas>

      <!-- Faction Territory Label (shows on system view) -->
      <div id="faction-label" style="display:none;"></div>
    </div>

    <!-- Bottom Panel -->
    <div id="bottom-panel">
      <!-- Ship List -->
      <div id="ship-list-panel">
        <h3>Your Ships</h3>
        <div id="ship-list"></div>
      </div>

      <!-- Selected Ship Info -->
      <div id="ship-info-panel" style="display:none;">
        <h3 id="ship-info-title">Ship Info</h3>
        <div id="ship-stats"></div>
        <div id="ship-actions"></div>
      </div>

      <!-- Action Log -->
      <div id="log-panel">
        <h3>Log</h3>
        <div id="log-messages"></div>
      </div>
    </div>

    <!-- Side Panel (Starbase / Build / Upgrade / Buildings / Officers / Missions / Alliance) -->
    <div id="side-panel" style="display:none;">
      <div id="side-panel-header">
        <h3 id="side-panel-title">Panel</h3>
        <button class="close-btn" onclick="closeSidePanel()">&times;</button>
      </div>
      <div id="side-panel-content"></div>
    </div>

    <!-- System Info Overlay -->
    <div id="system-info-overlay" style="display:none;">
      <div id="system-info-name"></div>
      <div id="system-info-type"></div>
      <div id="system-info-faction"></div>
      <div id="system-info-details"></div>
    </div>

    <!-- Quick Actions Bar -->
    <div id="quick-actions">
      <button onclick="openStarbase()" title="Starbase">&#127759; Starbase</button>
      <button onclick="openBuildMenu()" title="Build Ships">&#128296; Build</button>
      <button onclick="openUpgradeMenu()" title="Upgrade Ship">&#11014; Upgrade</button>
      <button onclick="openBuildingsPanel()" title="Buildings">&#127959; Buildings</button>
      <button onclick="openOfficersPanel()" title="Officers">&#9733; Officers</button>
      <button onclick="openMissionsPanel()" title="Missions">&#128220; Missions</button>
      <button onclick="openFactionsPanel()" title="Factions">&#9876; Factions</button>
      <button onclick="openAlliancePanel()" title="Alliance">&#128101; Alliance</button>
    </div>

    <!-- Event Banner (for mission complete, level up, etc.) -->
    <div id="event-banner" style="display:none;">
      <div id="event-banner-text"></div>
    </div>

    <!-- Alliance Chat Panel -->
    <div id="alliance-chat-panel" style="display:none;">
      <div class="chat-header">
        <span>Alliance Chat</span>
        <button class="close-btn" onclick="toggleAllianceChat()">&times;</button>
      </div>
      <div id="alliance-chat-messages"></div>
      <div class="chat-input-row">
        <input type="text" id="alliance-chat-input" placeholder="Type message..." maxlength="200">
        <button onclick="sendAllianceChat()">Send</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
